<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			http-equiv="Content-Security-Policy"
			content="default src 'self'; connect-src 'self';"
		/>
		<title>NeoCable</title>
	</head>
	<body>
		<h1>Welcome to NeoCable</h1>
		<video id="video-player" width="640" height="360" controls>
			<source src="assets/bbb_sunflower_1080p_60fps_normal.mp4"
			type="video/mp4"
		</video>
		<script>
			const { websocket } = window;

			websocket.send("Hello from renderer!");

			websocket.onmessage((message) => {
				console.log("Received from server", message);
			});
		</script>
		<script>
			const controlVideo = (command) => {
				const video = document.getElementById("video-player");

				if (!video) {
					console.error("Video element not found");
				}

				if (command === "play") {
					video.play();
				} else if (command === "pause") {
					video.pause();
				}
			};
		</script>
	</body>
</html>
